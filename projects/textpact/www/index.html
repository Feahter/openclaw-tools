<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深渊迷城 - TextPact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-input: #1a1a24;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --accent: #6b5ce7;
            --accent-glow: #8b7cf7;
            --danger: #e74c3c;
            --success: #2ecc71;
            --warning: #f39c12;
            --fossil: #9b59b6;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 标题 */
        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg-card) 0%, #1a1a2e 100%);
            border-radius: 16px;
            border: 1px solid #2a2a3e;
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--fossil) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .status-item {
            flex: 1;
            min-width: 120px;
            background: var(--bg-card);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #2a2a3e;
            text-align: center;
        }

        .status-item .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .status-item .value {
            font-size: 18px;
            font-weight: bold;
        }

        .status-item.energy .value {
            color: var(--success);
        }

        .status-item.gold .value {
            color: #ffd54f;
        }

        .status-item.fossils .value {
            color: var(--fossil);
        }

        .status-item.turns .value {
            color: var(--warning);
        }

        .status-item.combat {
            background: linear-gradient(135deg, #2a1515 0%, #3a1a1a 100%);
            border-color: var(--danger);
        }

        .status-item.combat .value {
            color: var(--danger);
        }

        /* 主游戏区 */
        .game-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 日志区 */
        .log-container {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid #2a2a3e;
            overflow: hidden;
        }

        .log-header {
            padding: 12px 16px;
            background: #1a1a24;
            border-bottom: 1px solid #2a2a3e;
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-content {
            height: 400px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-content::-webkit-scrollbar {
            width: 6px;
        }

        .log-content::-webkit-scrollbar-thumb {
            background: #3a3a4e;
            border-radius: 3px;
        }

        .log-entry {
            padding: 12px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-entry.input {
            background: #1a1a24;
            border-left: 3px solid var(--accent);
        }

        .log-entry.input .text {
            color: var(--accent-glow);
            font-size: 14px;
        }

        .log-entry.output {
            background: transparent;
        }

        .log-entry.output .text {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 14px;
        }

        .log-entry.output.move { border-left: 3px solid var(--success); }
        .log-entry.output.explore { border-left: 3px solid var(--accent); }
        .log-entry.output.rest { border-left: 3px solid var(--success); }
        .log-entry.output.collect { border-left: 3px solid var(--warning); }
        .log-entry.output.pray { border-left: 3px solid var(--fossil); }
        .log-entry.output.create { border-left: 3px solid var(--fossil); }
        .log-entry.output.error { border-left: 3px solid var(--danger); }
        .log-entry.output.unknown { border-left: 3px solid var(--text-secondary); }

        .energy-change {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }

        .energy-change.positive {
            background: rgba(46, 204, 113, 0.2);
            color: var(--success);
        }

        .energy-change.negative {
            background: rgba(231, 76, 60, 0.2);
            color: var(--danger);
        }

        /* 输入区 */
        .input-area {
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-input);
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: var(--accent);
        }

        .input-area input::placeholder {
            color: #4a4a5e;
        }

        .input-area button {
            padding:24px;
            14px  background: linear-gradient(135deg, var(--accent) 0%, #5a4cd7 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(107, 92, 231, 0.4);
        }

        .input-area button:active {
            transform: translateY(0);
        }

        /* 快捷指令 */
        .quick-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 8px 14px;
            background: var(--bg-card);
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #1a1a24;
            color: var(--text-primary);
            border-color: var(--accent);
        }

        .quick-btn.combat-btn {
            border-color: var(--danger);
            color: var(--danger);
        }

        .quick-btn.combat-btn:hover {
            background: rgba(231, 76, 60, 0.2);
        }

        /* 冷却状态 */
        .quick-btn.cooldown {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #444;
        }

        .quick-btn.cooldown:hover {
            background: var(--bg-card);
            color: var(--text-secondary);
            border-color: #444;
        }

        /* 功能按钮 */
        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .action-btn:hover {
            background: #1a1a24;
            color: var(--text-primary);
            border-color: var(--accent);
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 16px;
            color: #4a4a5e;
            font-size: 12px;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .header h1 {
                font-size: 22px;
            }

            .log-content {
                height: 300px;
            }

            .input-area {
                flex-direction: column;
            }

            .input-area button {
                width: 100%;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3a4e;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a5e;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1>深渊迷城</h1>
            <div class="subtitle">TextPact · 文字契约</div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item energy">
                <div class="label">契约力</div>
                <div class="value" id="energy-value">100</div>
            </div>
            <div class="status-item gold">
                <div class="label">金币</div>
                <div class="value" id="gold-value">100</div>
            </div>
            <div class="status-item location">
                <div class="label">当前位置</div>
                <div class="value" id="location-value">深渊入口</div>
            </div>
            <div class="status-item fossils">
                <div class="label">世界化石</div>
                <div class="value" id="fossils-value">0</div>
            </div>
            <div class="status-item inventory">
                <div class="label">背包</div>
                <div class="value" id="inventory-value">0</div>
            </div>
            <div class="status-item combat" id="combat-status" style="display: none;">
                <div class="label">⚔️ 敌人</div>
                <div class="value" id="enemy-value">-</div>
            </div>
            <div class="status-item turns">
                <div class="label">行动次数</div>
                <div class="value" id="turns-value">0</div>
            </div>
        </div>

        <!-- 游戏区域 -->
        <div class="game-area">
            <!-- 日志 -->
            <div class="log-container">
                <div class="log-header">
                    <span>冒险日志</span>
                    <span id="bubble-id">气泡ID: ...</span>
                </div>
                <div class="log-content" id="log-content">
                    <div class="log-entry output explore">
                        <div class="text">✨ 欢迎来到深渊迷城！

你是一名坠入深渊的探险者。
只有找到传说中的"光之门"，才能逃出这里。

💡 试着输入指令开始探索：
- 输入"探索"查看当前房间
- 输入"北/南/东/西"移动
- 输入"休息"恢复体力</div>
                    </div>
                </div>
            </div>

            <!-- 快捷指令 -->
            <div class="quick-actions">
                <button class="quick-btn" onclick="sendInput('探索')">探索</button>
                <button class="quick-btn" onclick="sendInput('休息')">休息</button>
                <button class="quick-btn" onclick="sendInput('祈祷')">祈祷</button>
                <button class="quick-btn" onclick="sendInput('收集')">收集</button>
                <button class="quick-btn" onclick="sendInput('北')">北</button>
                <button class="quick-btn" onclick="sendInput('南')">南</button>
                <button class="quick-btn" onclick="sendInput('东')">东</button>
                <button class="quick-btn" onclick="sendInput('西')">西</button>
            </div>

            <!-- 战斗指令 -->
            <div class="quick-actions" id="combat-actions" style="display: none;">
                <button class="quick-btn combat-btn" onclick="sendInput('攻击')">⚔️ 攻击</button>
                <button class="quick-btn combat-btn" onclick="sendInput('防御')">🛡️ 防御</button>
                <button class="quick-btn combat-btn" onclick="sendInput('必杀')">🔥 必杀</button>
                <button class="quick-btn combat-btn" onclick="sendInput('逃跑')">🏃 逃跑</button>
            </div>

            <!-- 输入 -->
            <div class="input-area">
                <input type="text" id="action-input" placeholder="输入你的行动..." autocomplete="off">
                <button onclick="submitAction()">执行</button>
            </div>

            <!-- 功能按钮 -->
            <div class="action-buttons">
                <button class="action-btn" onclick="exportSave()">💾 导出存档</button>
                <button class="action-btn" onclick="importSave()">📂 导入存档</button>
                <button class="action-btn" onclick="newGame()">🔄 重新开始</button>
            </div>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            TextPact v0.1 · <a href="#">关于</a>
        </div>
    </div>

    <script src="engine.js"></script>
    <script src="theme.js"></script>
    <script>
        // 全局引擎
        let engine;

        // 初始化
        function init() {
            // 使用主题数据初始化引擎
            engine = new TextPactEngine(abyssTheme);
            
            // 更新UI
            updateStatus();
            document.getElementById('bubble-id').textContent = `气泡: ${engine.state.bubble_id.slice(0, 8)}`;
            
            // 聚焦输入框
            document.getElementById('action-input').focus();
        }

        // 更新状态栏
        function updateStatus() {
            const status = engine.getStatus();
            document.getElementById('energy-value').textContent = status.energy;
            document.getElementById('gold-value').textContent = status.gold || 0;
            document.getElementById('location-value').textContent = status.location;
            document.getElementById('fossils-value').textContent = status.fossils;
            document.getElementById('turns-value').textContent = status.turns;
            
            // 背包数量
            const inventoryCount = status.inventory ? status.inventory.length : 0;
            document.getElementById('inventory-value').textContent = inventoryCount;
            
            // 战斗状态
            const combatStatus = document.getElementById('combat-status');
            if (status.enemy) {
                combatStatus.style.display = 'block';
                document.getElementById('enemy-value').textContent = `${status.enemy} (${status.enemyHp})`;
            } else {
                combatStatus.style.display = 'none';
            }
            
            // 更新动作按钮状态（冷却显示）
            updateActionButtons(status.cooldowns);
        }
        
        // 更新动作按钮冷却状态
        function updateActionButtons(cooldowns) {
            const buttons = {
                '探索': cooldowns.explore <= 0,
                '祈祷': cooldowns.pray <= 0,
                '收集': cooldowns.collect <= 0,
                '创造': cooldowns.create <= 0
            };
            
            // 更新快捷按钮
            document.querySelectorAll('.quick-btn').forEach(btn => {
                const text = btn.textContent.trim();
                if (buttons[text] !== undefined) {
                    if (buttons[text]) {
                        btn.classList.remove('cooldown');
                        btn.title = '可用';
                    } else {
                        btn.classList.add('cooldown');
                        const cd = text === '探索' ? cooldowns.explore : 
                                   text === '祈祷' ? cooldowns.pray :
                                   text === '收集' ? cooldowns.collect : cooldowns.create;
                        btn.title = `冷却中 (${cd}回合)`;
                    }
                }
            });
        }

        // 发送输入
        function sendInput(text) {
            document.getElementById('action-input').value = text;
            submitAction();
        }

        // 提交动作
        function submitAction() {
            const input = document.getElementById('action-input');
            const action = input.value.trim();
            
            if (!action) return;

            // 添加输入日志
            addLog('input', `> ${action}`);

            // 处理动作
            const result = engine.processAction(action);

            // 添加输出日志
            let outputText = result.message;
            if (result.energyChange) {
                const sign = result.energyChange > 0 ? '+' : '';
                outputText += `<span class="energy-change ${result.energyChange > 0 ? 'positive' : 'negative'}">能量 ${sign}${result.energyChange}</span>`;
            }
            addLog('output', outputText, result.type);

            // 清空输入
            input.value = '';

            // 更新状态
            updateStatus();

            // 战斗按钮显示
            const combatActions = document.getElementById('combat-actions');
            if (result.combat) {
                combatActions.style.display = 'flex';
            } else {
                combatActions.style.display = 'none';
            }

            // 滚动到底部
            scrollToBottom();
        }

        // 添加日志
        function addLog(type, text, resultType = '') {
            const logContent = document.getElementById('log-content');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type} ${resultType}`;
            entry.innerHTML = `<div class="text">${text}</div>`;
            logContent.appendChild(entry);
        }

        // 滚动到底部
        function scrollToBottom() {
            const logContent = document.getElementById('log-content');
            logContent.scrollTop = logContent.scrollHeight;
        }

        // 导出存档
        function exportSave() {
            const saveData = engine.exportSave();
            
            // 创建下载
            const blob = new Blob([saveData], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `textpact-save-${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            
            alert('✅ 存档已导出！\n\n复制文件内容分享给朋友，可以进行气泡共鸣。');
        }

        // 导入存档
        function importSave() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt,.json';
            
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const saveData = event.target.result;
                    const result = engine.importSave(saveData);
                    
                    if (result.success) {
                        alert(result.message);
                        updateStatus();
                        
                        // 清空日志，添加导入提示
                        document.getElementById('log-content').innerHTML = '';
                        addLog('output', result.message, 'create');
                    } else {
                        alert('❌ ' + result.message);
                    }
                };
                reader.readAsText(file);
            };
            
            input.click();
        }

        // 重新开始
        function newGame() {
            if (confirm('确定要重新开始吗？当前进度将会丢失。')) {
                engine = new TextPactEngine(abyssTheme);
                
                // 清空日志
                document.getElementById('log-content').innerHTML = '';
                addLog('output', '🔄 游戏重新开始！\n\n你是一名坠入深渊的探险者...\n\n💡 试着输入"探索"开始。', 'explore');
                
                updateStatus();
                document.getElementById('bubble-id').textContent = `气泡: ${engine.state.bubble_id.slice(0, 8)}`;
            }
        }

        // 回车提交
        document.getElementById('action-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitAction();
            }
        });

        // 初始化
        init();
    </script>
</body>
</html>
