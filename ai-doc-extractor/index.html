<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 文档提取器 - MVP</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #333; margin-bottom: 20px; }
    .upload-area { background: white; border: 2px dashed #ddd; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-area:hover { border-color: #4A90E2; background: #f0f7ff; }
    .upload-area.dragover { border-color: #4A90E2; background: #e6f0ff; }
    #preview { max-width: 100%; margin-top: 20px; display: none; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .result { background: white; border-radius: 8px; padding: 20px; margin-top: 20px; display: none; }
    .result h2 { color: #333; margin-bottom: 15px; }
    .field { display: flex; padding: 10px 0; border-bottom: 1px solid #eee; }
    .field:last-child { border-bottom: none; }
    .field-label { font-weight: 600; color: #666; width: 120px; }
    .field-value { color: #333; flex: 1; }
    .field-value.empty { color: #999; font-style: italic; }
    .loading { display: none; text-align: center; padding: 20px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid #4A90E2; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .progress { color: #666; margin-top: 10px; }
    .error { background: #ffe6e6; color: #d32f2f; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 AI 文档提取器</h1>
    <p style="color: #666; margin-bottom: 20px;">上传发票或合同图片，自动提取关键信息</p>
    
    <div class="upload-area" id="uploadArea">
      <p style="font-size: 18px; color: #666;">点击或拖拽上传图片</p>
      <p style="font-size: 14px; color: #999; margin-top: 10px;">支持 JPG, PNG, PDF</p>
      <input type="file" id="fileInput" accept="image/*,.pdf" style="display: none;">
    </div>
    
    <img id="preview" alt="预览">
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p class="progress" id="progressText">正在识别中...</p>
    </div>
    
    <div class="error" id="error"></div>
    
    <div class="result" id="result">
      <h2>提取结果</h2>
      <div id="fields"></div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const loading = document.getElementById('loading');
    const progressText = document.getElementById('progressText');
    const resultDiv = document.getElementById('result');
    const fieldsDiv = document.getElementById('fields');
    const errorDiv = document.getElementById('error');

    // 字段定义
    const fieldLabels = {
      invoiceNumber: '发票号码',
      date: '开票日期',
      totalAmount: '价税合计',
      amount: '金额',
      taxAmount: '税额',
      sellerName: '销售方',
      sellerTaxId: '销售方税号',
      buyerName: '购买方',
      buyerTaxId: '购买方税号'
    };

    // 提取逻辑
    function extractInfo(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l);
      const info = {};

      // 发票号
      const invoiceMatch = text.match(/(?:发票号|发票号码|No|no|第)\s*[:：]?\s*([A-Z0-9]{10,20})/i);
      if (invoiceMatch) info.invoiceNumber = invoiceMatch[1];
      
      // 日期
      const dateMatch = text.match(/(\d{4}[年\-/.]\d{1,2}[月\-/.]\d{1,2}[日]?)/);
      if (dateMatch) info.date = dateMatch[1].replace(/[年月日]/g, '-').replace(/-+$/, '');
      
      // 金额
      const amounts = text.match(/[¥$￥]?\s*(\d{1,3}(?:,\d{3})*(?:\.\d{2})?)/g) || [];
      const nums = amounts.map(a => parseFloat(a.replace(/[¥$￥,\s]/g, ''))).filter(n => !isNaN(n));
      if (nums.length > 0) info.totalAmount = Math.max(...nums);
      if (nums.length > 1) info.amount = nums[Math.max(0, nums.indexOf(Math.max(...nums)) - 1)] || nums[0];
      
      // 税号
      const taxIds = text.match(/[0-9A-Z]{15,20}/g) || [];
      if (taxIds[0]) info.sellerTaxId = taxIds[0];
      if (taxIds[1]) info.buyerTaxId = taxIds[1];
      
      // 公司名（简单heuristic）
      const companyPattern = /(?:公司|企业|有限|集团)(?:名称|)?[：:]\s*([^\n]{2,30})/;
      const companyMatch = text.match(companyPattern);
      if (companyMatch) info.sellerName = companyMatch[1];

      return info;
    }

    // 渲染结果
    function renderResult(info) {
      fieldsDiv.innerHTML = '';
      for (const [key, label] of Object.entries(fieldLabels)) {
        const value = info[key];
        const div = document.createElement('div');
        div.className = 'field';
        div.innerHTML = `
          <div class="field-label">${label}</div>
          <div class="field-value ${value ? '' : 'empty'}">${value || '未识别'}</div>
        `;
        fieldsDiv.appendChild(div);
      }
      resultDiv.style.display = 'block';
    }

    // 上传处理
    async function handleFile(file) {
      if (!file) return;
      
      // 显示预览
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.src = e.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
      
      // 隐藏之前的结果
      resultDiv.style.display = 'none';
      errorDiv.style.display = 'none';
      
      // 显示加载
      loading.style.display = 'block';
      
      try {
        // OCR 识别
        const result = await Tesseract.recognize(file, 'chi_sim+eng', {
          logger: m => {
            if (m.status === 'recognizing text') {
              progressText.textContent = `识别中... ${Math.round(m.progress * 100)}%`;
            }
          }
        });
        
        const text = result.data.text;
        console.log('OCR结果:', text);
        
        // 提取信息
        const info = extractInfo(text);
        renderResult(info);
        
      } catch (err) {
        errorDiv.textContent = '识别失败: ' + err.message;
        errorDiv.style.display = 'block';
      } finally {
        loading.style.display = 'none';
      }
    }

    // 事件监听
    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
    
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });
  </script>
</body>
</html>
