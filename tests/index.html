<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OpenNoCode 测试</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
    .pass { color: #0f0; }
    .fail { color: #f00; }
    h1 { color: #fff; }
    #results { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>🧪 OpenNoCode 测试</h1>
  <div id="results"></div>
  <script>
// 测试框架
const tests = [];
const results = [];

function test(name, fn) {
  tests.push({ name, fn });
}

function assert(condition, message) {
  if (!condition) throw new Error(message || '断言失败');
}

function log(result, name) {
  results.push({ name, result });
  const div = document.createElement('div');
  div.className = result ? 'pass' : 'fail';
  div.textContent = (result ? '✅' : '❌') + ' ' + name;
  document.getElementById('results').appendChild(div);
}

// ==================
// 测试用例
// ==================

test('字段创建', () => {
  const field = { id: 'f1', name: 'test', type: 'text' };
  assert(field.id === 'f1');
});

test('应用创建', () => {
  const app = { id: 'a1', name: '测试', type: 'data' };
  assert(app.name === '测试');
});

test('记录CRUD', () => {
  const records = [{ id: 'r1', data: { name: 'test' } }];
  assert(records.length === 1);
  records[0].data.name = '更新';
  assert(records[0].data.name === '更新');
});

test('公式计算 1+1', () => {
  const result = 1 + 1;
  assert(result === 2);
});

test('数组过滤', () => {
  const arr = [1,2,3,4,5];
  const filtered = arr.filter(x => x > 3);
  assert(filtered.length === 2);
});

// 运行
tests.forEach(t => {
  try {
    t.fn();
    log(true, t.name);
  } catch(e) {
    log(false, t.name + ': ' + e.message);
  }
});

document.write('<h2>共 ' + tests.length + ' 个测试</h2>');
  </script>
</body>
</html>
